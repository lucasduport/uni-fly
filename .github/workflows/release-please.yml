name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          # Config & manifest live under .github/ to keep the repo root tidy.
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          target-branch: main

      # Regenerate uv.lock after version bump to ensure consistency
      - name: Setup uv
        if: steps.release.outputs.release_created == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.2"
          enable-cache: true

      - name: Get release PR branch
        if: steps.release.outputs.release_created == 'true'
        id: pr-branch
        run: |
          BRANCH=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ steps.release.outputs.pr }}" | \
            jq -r '.head.ref')
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout release PR branch
        if: steps.release.outputs.release_created == 'true'
        run: |
          git fetch origin ${{ steps.pr-branch.outputs.branch }}
          git checkout ${{ steps.pr-branch.outputs.branch }}

      - name: Regenerate lockfile
        if: steps.release.outputs.release_created == 'true'
        run: |
          uv python install 3.12
          uv lock

      - name: Commit lockfile update to PR branch
        if: steps.release.outputs.release_created == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          git commit -m "chore: update uv.lock after release"
          git push origin HEAD
