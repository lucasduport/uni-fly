repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # mkdocs.yml uses !!python/name:... tags (PyYAML custom constructors)
        # for the Material emoji extension. The default check-yaml loader
        # refuses them; exclude rather than relax with --unsafe.
        exclude: ^mkdocs\.yml$
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        files: ^packages/worker/src/
        additional_dependencies:
          - pydantic>=2.7
          - pydantic-settings>=2.3
          - mistralai-workflows[mistralai]
          - structlog>=24.1
          - httpx>=0.27

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.10
    hooks:
      - id: uv-lock
