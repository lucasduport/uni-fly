[project]
name = "unifly-worker"
version = "0.1.2"
description = "Mistral Workflows worker that syncs bank transactions to Firefly III via Mistral classification"
requires-python = ">=3.12,<3.15"
license = { text = "MIT" }
authors = [{ name = "Lucas Duport", email = "lucasdup@icloud.com" }]

dependencies = [
    "mistralai-workflows[mistralai,encryption]",
    "httpx>=0.27",
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
    "alembic>=1.13",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/unifly_worker"]

[project.scripts]
unifly-worker = "unifly_worker.__main__:main"
