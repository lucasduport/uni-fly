[project]
name = "unifly-worker"
version = "0.1.0"
description = "Temporal worker that syncs bank transactions to Firefly III via Mistral classification"
readme = "README.md"
requires-python = ">=3.12,<3.15"
license = { text = "MIT" }
authors = [{ name = "Lucas Duport", email = "lucasdup@icloud.com" }]

dependencies = [
    "mistralai-workflows[mistralai]",
    "httpx>=0.27",
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "structlog>=24.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/unifly_worker"]

[project.scripts]
unifly-worker = "unifly_worker.__main__:main"
